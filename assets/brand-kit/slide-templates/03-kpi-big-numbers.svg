<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="Verdana, sans-serif">
  <rect width="1920" height="1080" fill="#221C46"/>

  <!-- Logo top-left -->
  <text x="100" y="100" fill="#FFFFFF" font-size="32" font-weight="800">pluxee</text>

  <!-- Title -->
  <text x="100" y="200" fill="#FFFFFF" font-size="64" font-weight="700">Ce qu'on va mesurer.</text>
  <text x="100" y="250" fill="#FFFFFF" font-size="28" font-weight="500" opacity="0.7">Pas de vanity metrics. Que des KPIs business.</text>

  <!-- Grille 3x2 KPI big numbers -->
  <g>
    <text x="320" y="500" fill="#00EB5E" font-size="160" font-weight="900" text-anchor="middle">2M</text>
    <text x="320" y="560" fill="#FFFFFF" font-size="20" text-anchor="middle">Reach mensuel</text>
  </g>
  <g>
    <text x="960" y="500" fill="#17CCF9" font-size="160" font-weight="900" text-anchor="middle">6%</text>
    <text x="960" y="560" fill="#FFFFFF" font-size="20" text-anchor="middle">Taux d'engagement</text>
  </g>
  <g>
    <text x="1600" y="500" fill="#FF7375" font-size="160" font-weight="900" text-anchor="middle">20</text>
    <text x="1600" y="560" fill="#FFFFFF" font-size="20" text-anchor="middle">Leaders actifs</text>
  </g>
  <g>
    <text x="320" y="820" fill="#FFDC37" font-size="160" font-weight="900" text-anchor="middle">15%</text>
    <text x="320" y="880" fill="#FFFFFF" font-size="20" text-anchor="middle">Lead B2B social</text>
  </g>
  <g>
    <text x="960" y="820" fill="#FFFFFF" font-size="160" font-weight="900" text-anchor="middle">#1</text>
    <text x="960" y="880" fill="#FFFFFF" font-size="20" text-anchor="middle">Share of voice</text>
  </g>
  <g>
    <text x="1600" y="820" fill="#00EB5E" font-size="160" font-weight="900" text-anchor="middle">85%</text>
    <text x="1600" y="880" fill="#FFFFFF" font-size="20" text-anchor="middle">Sentiment positif</text>
  </g>

  <text x="100" y="1040" fill="#FFFFFF" font-size="12" opacity="0.5">Confidentiel · [Agence] · Mai 2025</text>
  <text x="1820" y="1040" fill="#FFFFFF" font-size="12" opacity="0.5" text-anchor="end">19 / 20</text>
</svg>
